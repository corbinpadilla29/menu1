<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christmas Menu</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0b5d1e 0%, #0a3d15 50%, #8B0000 100%);
  color: #fffaf0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center; min-height: 100vh; padding: 20px; padding-bottom: 100px;
  position: relative; overflow-x: hidden;
}
@keyframes snowfall { 0% { top: -10%; } 100% { top: 100%; } }
.snowflake { position:fixed; top:-10%; color:white; font-size:20px; opacity:0.8; pointer-events:none; z-index:1; animation:snowfall linear infinite; }
.snowflake:nth-child(1){left:10%;animation-duration:8s;animation-delay:0s}
.snowflake:nth-child(2){left:20%;animation-duration:10s;animation-delay:1s}
.snowflake:nth-child(3){left:30%;animation-duration:9s;animation-delay:2s}
.snowflake:nth-child(4){left:40%;animation-duration:11s;animation-delay:.5s}
.snowflake:nth-child(5){left:50%;animation-duration:7s;animation-delay:1.5s}
.snowflake:nth-child(6){left:60%;animation-duration:9.5s;animation-delay:2.5s}
.snowflake:nth-child(7){left:70%;animation-duration:8.5s;animation-delay:1s}
.snowflake:nth-child(8){left:80%;animation-duration:10.5s;animation-delay:0s}
.snowflake:nth-child(9){left:90%;animation-duration:9s;animation-delay:2s}
.header { margin-bottom:30px; position:relative; z-index:10; animation:slideDown .6s ease-out; }
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
h1 { font-family:'Brush Script MT',cursive; font-size:clamp(45px,8vw,70px); color:#ffd700; text-shadow:3px 3px 8px #000,0 0 20px #ffd700; margin:20px 0 10px; animation:glow 2s ease-in-out infinite; }
@keyframes glow{0%,100%{text-shadow:3px 3px 8px #000,0 0 20px #ffd700}50%{text-shadow:3px 3px 8px #000,0 0 30px #ffd700,0 0 40px #ffa500}}
h2 { font-size:clamp(22px,4vw,32px); color:#e6ffe6; text-shadow:2px 2px 4px #000; }
.nav-buttons { display:flex; gap:15px; justify-content:center; flex-wrap:wrap; margin-bottom:30px; position:relative; z-index:10; }
.nav-btn { padding:12px 24px; background:linear-gradient(145deg,#ffd700,#ffed4e); color:#0b3d1a; font-size:18px; font-weight:bold; border:none; border-radius:12px; cursor:pointer; transition:all .3s ease; box-shadow:0 4px 8px rgba(0,0,0,.3); text-decoration:none; display:inline-block; }
.nav-btn:hover{transform:translateY(-3px);box-shadow:0 6px 12px rgba(0,0,0,.4);background:linear-gradient(145deg,#ffed4e,#fff)}
.back-btn{background:linear-gradient(145deg,#c62828,#8B0000);color:white}
.back-btn:hover{background:linear-gradient(145deg,#e53935,#c62828)}
.form-container{max-width:500px;margin:0 auto 30px;position:relative;z-index:10}
#addItemForm{display:none;background:linear-gradient(145deg,#0b3d1a,#0a2d13);padding:25px;border:3px solid #ffd700;border-radius:15px;color:white;box-shadow:0 8px 20px rgba(0,0,0,.4)}
#addItemForm h3{margin-bottom:20px;color:#ffd700;font-size:24px}
#addItemForm label{display:block;text-align:left;margin-bottom:8px;font-weight:bold;color:#ffeb3b}
#addItemForm select,#addItemForm input{width:100%;padding:10px;margin-bottom:15px;border:2px solid #ffd700;border-radius:8px;background:#0a2d13;color:white;font-size:16px}
#addItemForm select:focus,#addItemForm input:focus{outline:none;border-color:#ffed4e}
#saveNewItem{width:100%;padding:12px;background:linear-gradient(145deg,#c62828,#8B0000);color:white;border:none;border-radius:8px;cursor:pointer;font-size:18px;font-weight:bold;transition:all .3s}
#saveNewItem:hover{background:linear-gradient(145deg,#e53935,#c62828);transform:translateY(-2px)}
.menu-container{width:100%;max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;position:relative;z-index:10;animation:fadeIn .8s ease-out .2s backwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.menu-header{font-family:'Brush Script MT',cursive;font-size:clamp(30px,5vw,38px);color:#ffeb3b;text-shadow:2px 2px 5px #000,0 0 15px #ffd700;margin-bottom:15px;text-decoration:underline;text-underline-offset:8px}
.menu-column{display:flex;flex-direction:column;gap:16px;align-items:center}
.item{background:linear-gradient(145deg,#0b5d1e,#0f7a28);border:3px solid #ffd700;border-radius:25px;width:100%;max-width:400px;padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);position:relative;box-shadow:0 8px 15px rgba(0,0,0,.4)}
.item:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 0 20px #ffd700,0 8px 20px rgba(0,0,0,.5)}
.item:focus{outline:3px solid #ffd700;outline-offset:3px}
.item img{width:70px;height:70px;object-fit:cover;border-radius:12px;border:2px solid #ffd700;flex-shrink:0;transition:transform .3s}
.item:hover img{transform:rotate(-5deg) scale(1.1)}
.item-text{text-align:left;flex:1;min-width:0}
.item-name{font-size:clamp(24px,4vw,28px);margin:0 0 5px;font-weight:600;word-wrap:break-word}
.item-price{font-size:clamp(18px,3vw,22px);color:#fff;margin:0}
.out-of-stock{opacity:.5;text-decoration:line-through}
.out-of-stock img{filter:grayscale(100%)}
.out-of-stock::after{content:'❄️ OUT OF STOCK';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#ff4444;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:bold;white-space:nowrap;pointer-events:none}
.remove-btn{background:#c62828;color:white;border:none;padding:8px 14px;font-size:18px;font-weight:bold;border-radius:8px;cursor:pointer;margin-left:auto;opacity:0;pointer-events:none;transition:all .3s ease;flex-shrink:0}
.item:hover .remove-btn{opacity:1;pointer-events:auto}
.remove-btn:hover{background:#8e0000;transform:scale(1.1)}
#loadingMsg{font-size:28px;color:#ffd700;margin:60px auto;position:relative;z-index:10}
#errorMsg{font-size:16px;color:#ffd700;background:rgba(0,0,0,.3);padding:16px 24px;border-radius:10px;margin:20px auto;max-width:600px;display:none;position:relative;z-index:10}
.bottom-right-image{position:fixed;bottom:20px;right:20px;width:140px;height:auto;z-index:9999;transition:transform .3s;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.bottom-right-image:hover{transform:scale(1.1) rotate(-5deg)}
@media(max-width:1024px){.menu-container{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){body{padding:15px;padding-bottom:120px}.menu-container{grid-template-columns:1fr}.item img{width:60px;height:60px}.bottom-right-image{width:100px}}
@media(max-width:480px){.item img{width:50px;height:50px}.bottom-right-image{width:80px}}
@media(hover:none){.remove-btn{opacity:1;pointer-events:auto}.item{min-height:90px}}
</style>
</head>
<body>

<div class="snowflake">❄</div><div class="snowflake">❄</div><div class="snowflake">❄</div>
<div class="snowflake">❄</div><div class="snowflake">❄</div><div class="snowflake">❄</div>
<div class="snowflake">❄</div><div class="snowflake">❄</div><div class="snowflake">❄</div>

<div class="header">
  <h1>🎄 Christmas Menu 🎄</h1>
  <h2>Holiday Specials &amp; Treats!</h2>
</div>

<div class="nav-buttons">
  <a href="../index.html" class="nav-btn back-btn">⬅️ Back to Launcher</a>
  <button id="addItemBtn" class="nav-btn">➕ Add New Item</button>
</div>

<div class="form-container">
  <div id="addItemForm">
    <h3>Add Menu Item</h3>
    <label for="newCategory">Category:</label>
    <select id="newCategory">
      <option value="foodColumn">Food</option>
      <option value="drinkColumn">Drinks</option>
      <option value="snackColumn">Snacks</option>
      <option value="snackColumn2">More Snacks</option>
    </select>
    <label for="newName">Item Name:</label>
    <input id="newName" type="text" placeholder="e.g., Gingerbread Cookie">
    <label for="newPrice">Price:</label>
    <input id="newPrice" type="text" placeholder="e.g., 2.50">
    <label for="newImage">Image Path:</label>
    <input id="newImage" type="text" placeholder="e.g., ../images/cookies.jpg">
    <button id="saveNewItem">Add Item</button>
  </div>
</div>

<p id="loadingMsg">Loading menu...</p>
<p id="errorMsg">⚠️ Could not load items.json. Make sure it's in the root project folder.</p>

<div class="menu-container" id="menuContainer" style="display:none">
  <div class="menu-column" id="foodColumn"><div class="menu-header">FOOD</div></div>
  <div class="menu-column" id="drinkColumn"><div class="menu-header">DRINKS</div></div>
  <div class="menu-column" id="snackColumn"><div class="menu-header">SNACKS</div></div>
  <div class="menu-column" id="snackColumn2"><div class="menu-header">MORE SNACKS</div></div>
</div>

<img src="../images/logo.jpg class="bottom-right-image" alt="Logo">

<script>
function attachToggle(item, column) {
  const handler = () => {
    item.classList.toggle('out-of-stock');
    column.removeChild(item);
    if (item.classList.contains('out-of-stock')) { column.appendChild(item); }
    else { const firstOut = column.querySelector('.out-of-stock'); firstOut ? column.insertBefore(item, firstOut) : column.appendChild(item); }
    saveStatus();
  };
  item.addEventListener('click', handler);
  item.addEventListener('keypress', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();handler();} });
}
function attachRemoveBtn(item) {
  const btn = document.createElement('button');
  btn.className = 'remove-btn'; btn.textContent = '✕'; btn.setAttribute('aria-label','Remove item');
  btn.addEventListener('click', e => { e.stopPropagation(); if(confirm('Remove this item?')){item.remove();saveStatus();} });
  item.appendChild(btn);
}
function buildItem(data, column) {
  const div = document.createElement('div');
  div.className = 'item' + (data.outOfStock ? ' out-of-stock' : '');
  div.setAttribute('tabindex','0');
  div.innerHTML = `<img src="${data.img}" alt="${data.name}" onerror="this.style.display='none'"><div class="item-text"><p class="item-name">${data.name}</p><p class="item-price">${data.price}</p></div>`;
  attachToggle(div, column); attachRemoveBtn(div); return div;
}
function saveStatus() {
  const items = [];
  document.querySelectorAll('.item').forEach(item => {
    items.push({ name:item.querySelector('.item-name').textContent.trim(), price:item.querySelector('.item-price').textContent.trim(), img:item.querySelector('img')?item.querySelector('img').getAttribute('src'):'', category:item.closest('.menu-column').id, outOfStock:item.classList.contains('out-of-stock') });
  });
  localStorage.setItem('christmasMenuItems', JSON.stringify(items));
}
async function loadMenu() {
  try {
    let data;
    try {
      const res = await fetch('../items.json');
      if (!res.ok) throw new Error('fetch failed');
      data = await res.json();
    } catch {
      const adminSaved = localStorage.getItem('adminMenuData');
      if (adminSaved) { data = JSON.parse(adminSaved); } else { throw new Error('no data'); }
    }
    const localSaved = JSON.parse(localStorage.getItem('christmasMenuItems') || '[]');
    const localMap = {}; localSaved.forEach(i => { localMap[i.name] = i; });
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('menuContainer').style.display = 'grid';
    ['foodColumn','drinkColumn','snackColumn','snackColumn2'].forEach(col => {
      const column = document.getElementById(col);
      (data[col]||[]).forEach(itemData => {
        const localItem = localMap[itemData.name];
        const merged = { ...itemData, outOfStock: localItem ? localItem.outOfStock : (itemData.outOfStock||false) };
        column.appendChild(buildItem(merged, column));
      });
    });
  } catch(e) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
  }
}
document.getElementById('addItemBtn').addEventListener('click', () => {
  const form = document.getElementById('addItemForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
});
document.getElementById('saveNewItem').addEventListener('click', () => {
  const category = document.getElementById('newCategory').value;
  const name = document.getElementById('newName').value.trim();
  const price = document.getElementById('newPrice').value.trim();
  const img = document.getElementById('newImage').value.trim();
  if(!name||!price||!img){alert('Please fill all fields!');return;}
  const column = document.getElementById(category);
  column.appendChild(buildItem({name, price:price.startsWith('$')?price:'$'+price, img, outOfStock:false}, column));
  saveStatus();
  document.getElementById('newName').value=''; document.getElementById('newPrice').value=''; document.getElementById('newImage').value='';
  document.getElementById('addItemForm').style.display='none'; alert('Item added!');
});
loadMenu();
</script>
</body>
</html>
