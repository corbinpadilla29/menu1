<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concession Stand Menu - Farmington, AR</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="refresh-indicator">
  <div class="refresh-dot"></div>
  <span>Auto-updating</span>
</div>

<div class="header">
  <h1>🍿 Concession Stand Menu</h1>
  <h2>Fresh & Delicious!</h2>
</div>

<p id="loadingMsg">Loading menu...</p>
<p id="errorMsg">⚠️ Menu temporarily unavailable. Please check back shortly.</p>

<div class="menu-container" id="menuContainer" style="display:none">
  <div class="menu-column" id="foodColumn"><div class="menu-header">FOOD</div></div>
  <div class="menu-column" id="drinkColumn"><div class="menu-header">DRINKS</div></div>
  <div class="menu-column" id="snackColumn"><div class="menu-header">SNACKS</div></div>
  <div class="menu-column" id="snackColumn2"><div class="menu-header">MORE SNACKS</div></div>
</div>

<img src="../images/logo.jpg" class="bottom-right-image" alt="Logo">

<script>
const AUTO_REFRESH_INTERVAL = 30000;
let refreshTimer = null;

function buildItem(data) {
  const div = document.createElement('div');
  div.className = 'item' + (data.outOfStock ? ' out-of-stock' : '');
  div.innerHTML = `
    <img src="${data.img}" alt="${escapeHtml(data.name)}" onerror="this.style.display='none'">
    <div class="item-text">
      <p class="item-name">${escapeHtml(data.name)}</p>
      <p class="item-price">${escapeHtml(data.price)}</p>
    </div>
    ${data.outOfStock ? '<div class="out-of-stock-badge">OUT OF STOCK</div>' : ''}
  `;
  return div;
}

async function loadMenu() {
  try {
    let data = null;
    const savedData = localStorage.getItem('adminMenuData');
    if (savedData) {
      try { data = JSON.parse(savedData); } catch (e) {}
    }
    
    if (!data) {
      const res = await fetch('../items.json');
      if (!res.ok) throw new Error('Fetch failed');
      data = await res.json();
    }

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('menuContainer').style.display = 'grid';

    ['foodColumn', 'drinkColumn', 'snackColumn', 'snackColumn2'].forEach(colName => {
      const column = document.getElementById(colName);
      const items = Array.from(column.children);
      items.forEach(item => {
        if (!item.classList.contains('menu-header')) item.remove();
      });
      (data[colName] || []).forEach(itemData => {
        column.appendChild(buildItem(itemData));
      });
    });
  } catch (err) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
  }
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadMenu, AUTO_REFRESH_INTERVAL);
}

window.addEventListener('storage', (e) => {
  if (e.key === 'adminMenuData') loadMenu();
});

function escapeHtml(unsafe) {
  if (!unsafe) return '';
  return String(unsafe).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (refreshTimer) clearInterval(refreshTimer);
  } else {
    loadMenu();
    startAutoRefresh();
  }
});

loadMenu();
startAutoRefresh();
window.addEventListener('online', loadMenu);
</script>
</body>
</html>
