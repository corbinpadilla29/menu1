<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <!-- ============================================================
       BASE STYLES — layout & structure only, no colors/fonts here
       ============================================================ -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      text-align: center;
      min-height: 100vh;
      padding: 15px;
      padding-bottom: 80px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Floating particles */
    @keyframes fall   { 0%{top:-10%} 100%{top:110%} }
    @keyframes spin   { 0%{top:-10%;transform:rotate(0deg)} 100%{top:110%;transform:rotate(720deg)} }
    @keyframes drift  { 0%{top:-10%;transform:translateX(0) rotate(0deg)} 100%{top:110%;transform:translateX(80px) rotate(360deg)} }

    .particle {
      position: fixed;
      font-size: 22px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }
    .particle:nth-child(1){left:10%;animation-duration:8s;animation-delay:0s}
    .particle:nth-child(2){left:20%;animation-duration:10s;animation-delay:1s}
    .particle:nth-child(3){left:30%;animation-duration:9s;animation-delay:2s}
    .particle:nth-child(4){left:40%;animation-duration:11s;animation-delay:0.5s}
    .particle:nth-child(5){left:50%;animation-duration:7s;animation-delay:1.5s}
    .particle:nth-child(6){left:60%;animation-duration:9.5s;animation-delay:2.5s}
    .particle:nth-child(7){left:70%;animation-duration:8.5s;animation-delay:1s}
    .particle:nth-child(8){left:80%;animation-duration:10.5s;animation-delay:0s}
    .particle:nth-child(9){left:90%;animation-duration:9s;animation-delay:2s}

    /* Header */
    .header {
      margin-bottom: 25px;
      position: relative;
      z-index: 10;
      animation: slideDown 0.6s ease-out;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-30px) }
      to   { opacity:1; transform:translateY(0) }
    }
    h1 {
      font-size: clamp(40px, 7vw, 68px);
      margin: 15px 0 8px 0;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite;
    }
    h2 {
      font-size: clamp(18px, 3vw, 28px);
      font-style: italic;
      letter-spacing: 1px;
    }

    /* Nav buttons */
    .nav-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
      position: relative;
      z-index: 10;
    }
    .nav-btn {
      padding: 10px 22px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-decoration: none;
      display: inline-block;
      letter-spacing: 1px;
    }
    .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }

    /* Add-item form */
    .form-container {
      max-width: 500px;
      margin: 0 auto 25px auto;
      position: relative;
      z-index: 10;
    }
    #addItemForm {
      display: none;
      padding: 25px;
      border-radius: 15px;
      animation: slideDown 0.4s ease-out;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    #addItemForm h3 { margin-bottom: 18px; font-size: 22px; }
    #addItemForm label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-weight: bold;
    }
    #addItemForm select,
    #addItemForm input {
      width: 100%;
      padding: 10px;
      margin-bottom: 14px;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    #addItemForm select:focus,
    #addItemForm input:focus { outline: none; }
    #saveNewItem {
      width: 100%;
      padding: 11px;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      transition: all 0.3s;
    }
    #saveNewItem:hover { transform: translateY(-2px); }

    /* Menu grid */
    .menu-container {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.8s ease-out 0.2s backwards;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px) }
      to   { opacity:1; transform:translateY(0) }
    }
    .menu-header {
      font-size: clamp(24px, 3.5vw, 36px);
      margin-bottom: 12px;
      text-decoration: underline;
      text-underline-offset: 8px;
      letter-spacing: 3px;
      font-weight: bold;
    }
    .menu-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    /* Items */
    .item {
      width: 100%;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
      position: relative;
      border-radius: 16px;
    }
    .item:hover { transform: translateY(-4px) scale(1.02); }
    .item img {
      width: 55px;
      height: 55px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .item:hover img { transform: rotate(-5deg) scale(1.1); }
    .item-text { text-align: left; flex: 1; min-width: 0; }
    .item-name {
      font-size: clamp(13px, 1.6vw, 19px);
      margin: 0 0 3px 0;
      font-weight: 600;
      word-wrap: break-word;
    }
    .item-price {
      font-size: clamp(11px, 1.4vw, 16px);
      font-weight: bold;
    }

    /* Out of stock */
    .out-of-stock { opacity: 0.5; text-decoration: line-through; }
    .out-of-stock img { filter: grayscale(100%); }
    .out-of-stock::after {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }

    /* Remove button */
    .remove-btn {
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-left: auto;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .item:hover .remove-btn { opacity:1; pointer-events:auto; }
    .remove-btn:hover { transform: scale(1.1); }

    /* Logo */
    .bottom-right-image {
      position: fixed;
      bottom: 20px; right: 20px;
      width: 120px; height: auto;
      z-index: 9999;
      transition: transform 0.3s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    .bottom-right-image:hover { transform: scale(1.1) rotate(-5deg); }

    /* Loading message */
    #loadingMsg {
      font-size: 20px;
      padding: 40px;
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 1024px) { .menu-container { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 768px)  {
      body { padding: 10px; padding-bottom: 90px; }
      .menu-container { grid-template-columns: repeat(2,1fr); gap:8px; }
      .item img { width:42px; height:42px; }
      .bottom-right-image { width:80px; }
    }
    @media (max-width: 480px) {
      .menu-container { grid-template-columns: 1fr; }
      .item img { width:38px; height:38px; }
    }
    @media (hover: none) { .remove-btn { opacity:1; pointer-events:auto; } }
  </style>
</head>
<body>

  <!-- Floating particles (emojis assigned by JS based on theme) -->
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="header">
    <h1 id="pageTitle">Loading...</h1>
    <h2 id="pageSubtitle"></h2>
  </div>

  <div class="nav-buttons">
    <a href="../index.html" class="nav-btn back-btn" id="backBtn">⬅️ Back to Launcher</a>
    <button id="addItemBtn" class="nav-btn">➕ Add New Item</button>
  </div>

  <div class="form-container">
    <div id="addItemForm">
      <h3>Add Menu Item</h3>
      <label for="newCategory">Category:</label>
      <select id="newCategory"></select>
      <label for="newName">Item Name:</label>
      <input id="newName" type="text" placeholder="e.g., Lemonade">
      <label for="newPrice">Price (numbers only, e.g. 2.50):</label>
      <input id="newPrice" type="number" step="0.01" min="0" placeholder="2.50">
      <label for="newImage">Image path (e.g., images/lemonade.jpg):</label>
      <input id="newImage" type="text" placeholder="images/lemonade.jpg">
      <button id="saveNewItem">Add Item</button>
    </div>
  </div>

  <p id="loadingMsg">Loading menu...</p>
  <div class="menu-container" id="menuContainer" style="display:none"></div>

  <img src="images/logo.png" class="bottom-right-image" alt="Logo">

  <script>
  // ============================================================
  // LOAD BOTH JSON FILES, THEN BUILD THE PAGE
  // ============================================================
  Promise.all([
    fetch('menu.json').then(r => r.json()),
    fetch('themes.json').then(r => r.json())
  ])
  .then(([menu, themes]) => {
    const theme = themes[menu.theme] || themes['baseball'];
    applyTheme(theme);
    buildPage(menu, theme);
    loadStatus(menu);
  })
  .catch(err => {
    document.getElementById('loadingMsg').textContent =
      '⚠️ Could not load menu.json or themes.json. Make sure they are in the same folder as index.html.';
    console.error(err);
  });

  // ============================================================
  // APPLY THEME — injects CSS variables based on themes.json
  // ============================================================
  function applyTheme(t) {
    const style = document.createElement('style');

    // Background
    let bg = t.bodyBackground;
    if (t.bodyStripes && t.bodyStripes !== 'none') {
      bg = `${t.bodyBackground}, ${t.bodyStripes}`;
    }

    style.textContent = `
      body {
        background: ${bg};
        background-blend-mode: normal;
        color: ${t.textColor};
        font-family: ${t.fontFamily};
      }
      h1 {
        font-family: ${t.h1Font};
        color: ${t.accentColor};
        text-shadow: ${t.h1Shadow};
      }
      @keyframes glow {
        0%, 100% { text-shadow: ${t.h1Shadow}; }
        50%       { text-shadow: ${t.h1ShadowGlow}; }
      }
      h2 { color: ${t.h2Color}; }

      .nav-btn {
        background: ${t.navBtnBackground};
        color: ${t.navBtnColor};
        border: ${t.navBtnBorder};
      }
      .back-btn {
        background: ${t.backBtnBackground} !important;
        color: ${t.backBtnColor} !important;
        border: ${t.backBtnBorder} !important;
      }

      #addItemForm {
        background: ${t.formBackground};
        border: ${t.formBorder};
      }
      #addItemForm h3 { color: ${t.formHeaderColor}; }
      #addItemForm label { color: ${t.textColor}; }
      #addItemForm select,
      #addItemForm input {
        background: ${t.inputBackground};
        border: ${t.inputBorder};
        color: ${t.textColor};
      }
      #saveNewItem { background: ${t.saveButtonBackground}; }

      .menu-header {
        font-family: ${t.menuHeaderFont};
        color: ${t.menuHeaderColor};
        text-shadow: ${t.menuHeaderShadow};
      }
      .item {
        background: ${t.itemBackground};
        border: ${t.itemBorder};
        box-shadow: ${t.itemShadow};
      }
      .item:hover { box-shadow: ${t.itemShadowHover}; }
      .item img { border: 2px solid ${t.accentColor}; }
      .item-price { color: ${t.priceColor}; }
      .remove-btn { background: ${t.accentColorDark}; }
      .remove-btn:hover { background: ${t.accentColor}; }
      .out-of-stock::after {
        content: '${t.outOfStockEmoji} OUT OF STOCK';
        background: ${t.outOfStockBackground};
        color: ${t.outOfStockColor};
      }
      .particle {
        color: ${t.floatingEmojiColor};
        opacity: ${t.floatingEmojiOpacity};
        animation-name: ${t.floatingAnimation};
      }
    `;
    document.head.appendChild(style);

    // Assign random emojis to particles
    const emojis = t.floatingEmojis;
    document.querySelectorAll('.particle').forEach(el => {
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    });
  }

  // ============================================================
  // BUILD PAGE — renders columns and items from menu.json
  // ============================================================
  function buildPage(menu, theme) {
    document.getElementById('pageTitle').textContent = menu.title || 'Menu';
    document.getElementById('pageSubtitle').textContent = menu.subtitle || '';
    document.getElementById('loadingMsg').style.display = 'none';

    const container = document.getElementById('menuContainer');
    container.style.display = 'grid';

    // Populate category dropdown in the add-item form
    const catSelect = document.getElementById('newCategory');
    catSelect.innerHTML = '';
    menu.categories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.id;
      opt.textContent = cat.label;
      catSelect.appendChild(opt);
    });

    // Build each column
    menu.categories.forEach(cat => {
      const col = document.createElement('div');
      col.className = 'menu-column';
      col.id = cat.id;

      const header = document.createElement('div');
      header.className = 'menu-header';
      header.textContent = cat.label;
      col.appendChild(header);

      cat.items.forEach(itemData => {
        const el = buildItemElement(itemData);
        attachToggle(el, col);
        attachRemoveButton(el);
        col.appendChild(el);
      });

      container.appendChild(col);
    });
  }

  // ============================================================
  // BUILD A SINGLE ITEM ELEMENT
  // ============================================================
  function buildItemElement(data) {
    const el = document.createElement('div');
    el.className = 'item';
    el.setAttribute('tabindex', '0');
    if (data.outOfStock) el.classList.add('out-of-stock');
    el.innerHTML = `
      <img src="${data.image}" alt="${data.name}" onerror="this.style.background='#eee';this.removeAttribute('src')">
      <div class="item-text">
        <p class="item-name">${data.name}</p>
        <p class="item-price">$${parseFloat(data.price).toFixed(2)}</p>
      </div>`;
    return el;
  }

  // ============================================================
  // TOGGLE OUT-OF-STOCK
  // ============================================================
  function attachToggle(item, column) {
    const handler = () => {
      item.classList.toggle('out-of-stock');
      column.removeChild(item);
      if (item.classList.contains('out-of-stock')) {
        column.appendChild(item);
      } else {
        const firstOut = column.querySelector('.out-of-stock');
        if (firstOut) column.insertBefore(item, firstOut);
        else column.appendChild(item);
      }
      saveStatus();
    };
    item.addEventListener('click', handler);
    item.addEventListener('keypress', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
    });
  }

  // ============================================================
  // REMOVE BUTTON
  // ============================================================
  function attachRemoveButton(item) {
    const btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.textContent = '✕';
    btn.setAttribute('aria-label', 'Remove item');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('Remove this item?')) { item.remove(); saveStatus(); }
    });
    item.appendChild(btn);
  }

  // ============================================================
  // SAVE / LOAD OUT-OF-STOCK STATUS TO LOCALSTORAGE
  // ============================================================
  function saveStatus() {
    const state = {};
    document.querySelectorAll('.menu-column').forEach(col => {
      col.querySelectorAll('.item').forEach(item => {
        const name = item.querySelector('.item-name').textContent.trim();
        state[name] = item.classList.contains('out-of-stock');
      });
    });
    localStorage.setItem('menuStatus', JSON.stringify(state));
  }

  function loadStatus(menu) {
    const state = JSON.parse(localStorage.getItem('menuStatus') || '{}');
    if (Object.keys(state).length === 0) return;
    document.querySelectorAll('.item').forEach(item => {
      const name = item.querySelector('.item-name').textContent.trim();
      if (state[name] === true) {
        item.classList.add('out-of-stock');
        item.closest('.menu-column').appendChild(item);
      }
    });
  }

  // ============================================================
  // ADD ITEM FORM
  // ============================================================
  document.getElementById('addItemBtn').addEventListener('click', () => {
    const form = document.getElementById('addItemForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('saveNewItem').addEventListener('click', () => {
    const catId  = document.getElementById('newCategory').value;
    const name   = document.getElementById('newName').value.trim();
    const price  = document.getElementById('newPrice').value.trim();
    const image  = document.getElementById('newImage').value.trim();

    if (!name || !price || !image) { alert('Please fill in all fields!'); return; }

    const column = document.getElementById(catId);
    const el = buildItemElement({ name, price: parseFloat(price), image, outOfStock: false });
    attachToggle(el, column);
    attachRemoveButton(el);
    column.appendChild(el);
    saveStatus();

    document.getElementById('newName').value  = '';
    document.getElementById('newPrice').value = '';
    document.getElementById('newImage').value = '';
    document.getElementById('addItemForm').style.display = 'none';
    alert('Item added!');
  });
  </script>
</body>
</html>
